name = "trono-api"
main = "src/index.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trono-db"
# Replace YOUR_DATABASE_ID with the output of: wrangler d1 create trono-db
database_id = "c4e9201b-7ac2-472c-adb3-49e8db50e10d"
migrations_dir = "../../migrations"

[vars]
ENVIRONMENT = "production"
# Do NOT set JWT_SECRET here for production — use: wrangler secret put JWT_SECRET
JWT_SECRET = "acee318f976f9cdc335ff863005aedb74edd8a14dc2e3e5516cc3a9147d2dc28"
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
