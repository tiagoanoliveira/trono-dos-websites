name = "trono-api"
main = "src/index.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trono-db"
# Replace YOUR_DATABASE_ID with the output of: wrangler d1 create trono-db
database_id = "YOUR_DATABASE_ID"
migrations_dir = "../../migrations"

[vars]
ENVIRONMENT = "development"
# Do NOT set JWT_SECRET here for production — use: wrangler secret put JWT_SECRET
JWT_SECRET = "change-me-in-production"
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""

[[migrations]]
tag = "v1"
new_classes = ["TronoAPI"]
