name = "trono-api"
main = "src/index.ts"
compatibility_date = "2024-01-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trono-db"
# Replace YOUR_DATABASE_ID with the output of: wrangler d1 create trono-db
database_id = "c4e9201b-7ac2-472c-adb3-49e8db50e10d"
migrations_dir = "../../migrations"

[vars]
ENVIRONMENT = "production"
R2_PUBLIC_BASE_URL = ""
APP_BASE_URL = ""
EMAIL_FROM = ""

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "trono-assets"
